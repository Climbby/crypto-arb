<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- ArbWatch: two venue price paths with a highlighted arb gap -->
  <rect width="32" height="32" rx="7" fill="#0c1117"/>
  <!-- Venue A (lower ask path) -->
  <path
    d="M5 22 L11 18 L17 20 L27 11"
    stroke="#2a9d6e"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Venue B (higher bid path) -->
  <path
    d="M5 17 L11 12 L17 14 L27 6"
    stroke="#3ddc97"
    stroke-width="2.25"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arb gap marker between the spreads at the right -->
  <path
    d="M24.5 7.5 V12.5"
    stroke="#3ddc97"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.95"
  />
  <circle cx="24.5" cy="7.5" r="1.6" fill="#3ddc97"/>
  <circle cx="24.5" cy="12.5" r="1.6" fill="#2a9d6e"/>
</svg>
